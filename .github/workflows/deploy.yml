name: Deploy VitePress site to GitHub Pages

on:
  # main ブランチへの push（プルリクエストのマージを含む）でデプロイ
  push:
    branches: [main]
  # Actions タブからの手動実行も可能にする
  workflow_dispatch:

# GITHUB_TOKEN に Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つのデプロイのみを許可。進行中の実行はキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ビルドジョブ
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # デプロイジョブ
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
